<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Find metro bus routes in Islamabad including the Blue Line metro route, Orange Line metro, and all metro transit bus services with UniGo – your transport finder.">
  <meta name="keywords"
    content="metro bus, metro bus route, metro route, blue line metro route,Green line metro route, metro orange line, metro transit, metro bus service, metro transit bus, all metro route, Islamabad transport, UniGo">
  <meta name="author" content="Mohmmad Ehsaan ur Rehman Qazi">
  <title>UniGo | Metro Bus Routes, Blue Line, Orange Line & Transit Services</title>

  <!-- Open Graph (Facebook, LinkedIn) -->
  <meta property="og:title" content="UniGo - A Transport Finder">
  <meta property="og:description"
    content="Search metro bus routes, Blue Line metro route,Green line metro, Orange Line metro, and all metro transit bus services in Islamabad with UniGo.">
  <meta property="og:image" content="https://ehsaan-qazi.github.io/UniGo-A-Transport-Finder/pic.png">
  <meta property="og:url" content="https://ehsaan-qazi.github.io/UniGo-A-Transport-Finder/">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="UniGo - A Transport Finder">
  <meta name="twitter:description"
    content="UniGo makes finding metro bus routes, Blue Line,Green line, Orange Line, and all metro transit services in Islamabad simple and fast.">
  <meta name="twitter:image" content="https://ehsaan-qazi.github.io/UniGo-A-Transport-Finder/pic.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- UniGo CSS -->
  <link rel="stylesheet" href="src/css/index.css">
</head>

<body>

  <!-- TopNavBar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <div class="navbar-left">
        <div class="logo">UniGo</div>
        <div class="nav-links-desktop">
          <a href="index.html" class="nav-link active">Home</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="profile.html" class="nav-link">Profile</a>
        </div>
      </div>
      <div class="navbar-right">
        <a href="about.html" class="nav-link">Help</a>
        <a href="about.html" class="btn-primary-pill">About UniGo</a>
        <div class="menu-icon" id="menu-icon">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Overlay Menu -->
  <div class="overlay-menu" id="overlay-menu">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="profile.html">Profile</a>
    <a href="about.html">Help</a>
  </div>

  <!-- Main Content: Sidebar + Map -->
  <main class="main-layout">

    <!-- Map Background (Leaflet) -->
    <div class="map-container" id="map"></div>

    <!-- Sidebar Panel -->
    <div class="sidebar" id="sidebar">

      <!-- Search Card -->
      <div class="card search-card" id="search-card">
        <h1 class="card-title">Where do you want to go today?</h1>

        <div class="input-group">
          <!-- Vertical dotted connector -->
          <div class="input-connector"></div>

          <!-- Departure Input -->
          <div class="input-row">
            <div class="input-icon-circle">
              <div class="dot-hollow"></div>
            </div>
            <div class="input-field-wrap">
              <span class="input-label">I'm leaving from :</span>
              <input type="text" id="departure-input" class="input-field" placeholder="Type a station..." autocomplete="off">
              <ul class="suggestions-list" id="departure-suggestions"></ul>
            </div>
          </div>

          <!-- Destination Input -->
          <div class="input-row">
            <div class="input-icon-circle">
              <span class="material-symbols-outlined input-pin-icon">location_on</span>
            </div>
            <div class="input-field-wrap">
              <span class="input-label">I'm heading to :</span>
              <input type="text" id="destination-input" class="input-field" placeholder="Type a station..." autocomplete="off">
              <ul class="suggestions-list" id="destination-suggestions"></ul>
            </div>
          </div>
        </div>

        <button class="btn-search" id="search" onclick="findTrans()">SEARCH</button>
      </div>

      <!-- Route Result Card (hidden until search) -->
      <div class="card result-card-panel hide" id="result-panel">
        <div class="result-header">
          <button class="back-btn" id="back-btn" onclick="hideResults()">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h2 class="result-title" id="result-title">Your Trip</h2>
          <span class="fare-badge" id="fare-badge">Fare: Rs. 0</span>
          <p class="result-meta" id="result-meta">Arrival info</p>
        </div>
        <!-- Journey Steps rendered here -->
        <div class="journey-steps" id="journey-steps"></div>
      </div>

    </div>
  </main>

  <!-- UniGo Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="config.js?v=2"></script>
  <script src="src/js/utils/helpers.js"></script>
  <script src="src/js/utils/routeParser.js"></script>
  <script src="src/pathfinder.js"></script>
  <script src="src/js/core/dataLoader.js"></script>
  <script src="src/js/components/ui.js"></script>
  <script src="src/js/components/search.js"></script>
  <script src="script.js?v=2"></script>
  <script src="src/js/main.js"></script>

  <!-- Map Initialization -->
  <script>
    // Initialize Leaflet map centered on Islamabad
    const map = L.map('map', {
      center: [33.6844, 73.0479],
      zoom: 12,
      zoomControl: true,
      attributionControl: true
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);

    // Expose map globally so script.js can use it
    window.unigoMap = map;
  </script>
</body>

</html>
